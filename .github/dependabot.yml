version: 2

multi-ecosystem-groups:
  weekly-maintenance:
    schedule:
      interval: "weekly"
      day: "friday"
      time: "00:00"
      timezone: "UTC"
    commit-message:
      prefix: "deps"
      include: "scope"

updates:
  - package-ecosystem: "uv"
    directory: "/"
    patterns: ["*"]
    multi-ecosystem-group: "weekly-maintenance"
    cooldown:
      semver-major-days: 30
      semver-minor-days: 7
      semver-patch-days: 3

  - package-ecosystem: "github-actions"
    directory: "/"
    patterns: ["*"]
    multi-ecosystem-group: "weekly-maintenance"
    cooldown:
      default-days: 7

  - package-ecosystem: "docker"
    directory: "/"
    patterns: ["*"]
    multi-ecosystem-group: "weekly-maintenance"
    cooldown:
      default-days: 7

  - package-ecosystem: "pre-commit"
    directory: "/"
    patterns: ["*"]
    multi-ecosystem-group: "weekly-maintenance"
    cooldown:
      default-days: 7

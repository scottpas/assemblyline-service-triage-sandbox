name: Build

on:
  pull_request:
    branches: [ "main" ]
  push:
    branches: [ "main" ]
    tags:
      - 'v*.stable*'
      - 'v*.dev*'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  test:
    if: ${{ startsWith(github.ref, 'refs/tags/v') }}
    uses: ./.github/workflows/python-tests.yml

  docker:
    runs-on: ubuntu-24.04
    needs:
      - test
    if: ${{ always() && !cancelled() && (needs.test.result == 'success' || needs.test.result == 'skipped') }}
    env:
      DOCKER_IMAGE: ${{ github.repository }}
      IS_RELEASE: ${{ startsWith(github.ref, 'refs/tags/v') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Set variables
        run: |
          if [[ "$IS_RELEASE" == "true" ]]; then
            tag="${GITHUB_REF#refs/tags/v}"
            if [[ "$tag" == *stable* ]]; then
              build_type=stable
            else
              build_type=latest
            fi
          else
            tag=ci-${GITHUB_SHA::12}
            build_type=latest
          fi

          {
            echo "TAG=$tag"
            echo "BUILD_TYPE=$build_type"
            echo "SCAN_IMAGE=$DOCKER_IMAGE:$tag"
          } >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4.2.0

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v6.2.0
        with:
          images: ${{ env.DOCKER_IMAGE }}
          tags: |
            type=raw,value=${{ env.TAG }}
            type=raw,value=${{ env.BUILD_TYPE }},enable=${{ env.IS_RELEASE == 'true' }}

      - name: Build container
        uses: docker/build-push-action@v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          build-args: |
            version=${{ env.TAG }}
            branch=${{ env.BUILD_TYPE }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Generate SBOM
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.SCAN_IMAGE }}
          format: cyclonedx
          output: trivy-sbom.cdx.json

      - name: Scan container
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.SCAN_IMAGE }}
          format: table
          exit-code: "1"
          severity: CRITICAL
          ignore-unfixed: true

      - name: Upload SBOM
        if: ${{ always() }}
        uses: actions/upload-artifact@v7.0.1
        with:
          name: trivy-sbom
          path: trivy-sbom.cdx.json
          if-no-files-found: error

      - name: Login to DockerHub
        if: ${{ env.IS_RELEASE == 'true' }}
        uses: docker/login-action@v4.4.0
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Push release tags
        if: ${{ env.IS_RELEASE == 'true' }}
        run: |
          docker push "$DOCKER_IMAGE:$TAG"
          docker push "$DOCKER_IMAGE:$BUILD_TYPE"

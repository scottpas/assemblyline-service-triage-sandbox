name: Publish stable release

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  validate-ref:
    name: Require main branch
    runs-on: ubuntu-24.04
    steps:
      - name: Validate selected branch
        run: |
          if [[ "$GITHUB_REF" != "refs/heads/main" ]]; then
            echo "Stable releases must be dispatched from main." >&2
            exit 1
          fi

  quality:
    name: Quality
    needs: validate-ref
    uses: ./.github/workflows/_quality.yml
    with:
      ref: refs/heads/main

  publish:
    name: Publish stable
    needs: quality
    uses: ./.github/workflows/_publish.yml
    with:
      channel: stable
      ref: refs/heads/main
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

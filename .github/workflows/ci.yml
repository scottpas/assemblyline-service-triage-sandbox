name: CI

on:
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.event.pull_request.number }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  quality:
    name: Quality
    uses: ./.github/workflows/_quality.yml

  dependency-review:
    name: Dependency review
    runs-on: ubuntu-24.04
    steps:
      - name: Review dependency changes
        uses: actions/dependency-review-action@a1d282b36b6f3519aa1f3fc636f609c47dddb294 # v5.0.0

  container:
    name: Container build and scan
    needs: quality
    runs-on: ubuntu-24.04
    steps:
      - name: Checkout
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c # v4.2.0

      - name: Scan repository
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: fs
          scan-ref: .
          scanners: vuln,secret,misconfig
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true

      - name: Read compatibility version
        id: version
        run: |
          source .release-version
          if [[ ! "$ASSEMBLYLINE_VERSION" =~ ^[0-9]+\.[0-9]+$ || ! "$SERVICE_MAJOR" =~ ^[0-9]+$ ]]; then
            echo "Invalid values in .release-version" >&2
            exit 1
          fi
          echo "version=${ASSEMBLYLINE_VERSION}.${SERVICE_MAJOR}.dev0" >> "$GITHUB_OUTPUT"

      - name: Build container
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a # v7.3.0
        with:
          context: .
          file: ./Dockerfile
          platforms: linux/amd64
          load: true
          push: false
          build-args: |
            version=${{ steps.version.outputs.version }}
            branch=latest
          tags: local/triage-sandbox:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan container
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          image-ref: local/triage-sandbox:ci
          format: table
          exit-code: "1"
          severity: HIGH,CRITICAL
          ignore-unfixed: true
